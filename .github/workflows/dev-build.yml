name: Build Image, Push to Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-gov-west-1
  ECR_REPOSITORY: kaleidoscope-gki/geoprism-registry
  NODE_VERSION: "22"
  JAVA_VERSION: "17"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build Maven project
        run: |
          set -euo pipefail

          mvn --version
          mvn clean install -B

      - name: Prepare Docker build context
        run: |
          set -euo pipefail

          DOCKER_CONTEXT="src/build/docker/georegistry"

          rm -rf "$DOCKER_CONTEXT/target"
          mkdir -p "$DOCKER_CONTEXT/target"

          cp \
            georegistry-web/target/georegistry.war \
            "$DOCKER_CONTEXT/target/georegistry.war"

          cp -R \
            envcfg/prod \
            "$DOCKER_CONTEXT/target/appcfg"

          echo "Docker build context:"
          find "$DOCKER_CONTEXT/target" -maxdepth 2 -type f -print

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws-us-gov:iam::718787032875:role/github-actions-ecr-kaleidoscope-gki-geoprism-registry

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA: ${{ github.sha }}
        working-directory: src/build/docker/georegistry
        run: |
          set -euo pipefail

          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"

          echo "Building image: $IMAGE"

          docker build \
            --tag "$IMAGE:dev" \
            --tag "$IMAGE:$IMAGE_SHA" \
            .

          docker push "$IMAGE:$IMAGE_SHA"
          docker push "$IMAGE:dev"

      - name: Log out of Amazon ECR
        if: always() && steps.login-ecr.outcome == 'success'
        run: docker logout "${{ steps.login-ecr.outputs.registry }}"
